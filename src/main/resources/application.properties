spring.application.name=theproduct
server.port=8080

#Security - spring-boot-starter-security
spring.security.user.name=${SPRING_SECURITY_USER_NAME}
spring.security.user.password=${SPRING_SECURITY_USER_PASSWORD}

#JWT secret key for signing the tokens
jwt.secret=${JWT_SECRET}


#for https://console.cloud.google.com/auth/clients?project=advancejavademo&supportedpurview=project,organizationId,folder :
# Project Name : AdvanceJava Backend
google.client.id=${GOOGLE_CLIENT_ID}
google.client.secret=${GOOGLE_CLIENT_SECRET}


#for https://github.com/settings/applications/3710596 :
# Project Name : AdvanceJava Backend
#spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
#spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
spring.datasource.database=${DATABASE_NAME}